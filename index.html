<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART7</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

<header class="bg-dark text-white p-4">

    <div class="container text-center">

        <div id="usuarioLogadoTexto" class="usuario-box mb-3"></div>

        <h1 class="logo-art7">🎬 𝓐𝓡𝓣7</h1>
        <h2>Catálogo de Séries, Filmes e Animes</h2>

        <!-- Busca -->
        <div class="d-flex gap-2 mt-3 justify-content-center">

            <button class="btn btn-light" onclick="alternarTema()">
                🌙
            </button>

            <input
                type="text"
                id="campobusca"
                placeholder="Buscar..."
                class="form-control w-50">

        </div>

        <!-- Autenticação -->
        <div class="d-flex justify-content-between mt-3">

            <button
                id="btnOcultarAuth"
                class="btn btn-secondary"
                onclick="toggleAutenticacao()">
                Ocultar Login/Cadastro
            </button>


            <button
            class="btn btn-info"
            onclick="mostrarHistorico()">
                📜 Histórico
            </button>

            <button
            class="btn btn-warning"
            onclick="mostrarPerfil()">
                👑 Perfil
            </button>

            <button class="btn btn-warning"
            onclick="mostrarFavoritos()">
                ⭐ Favoritos
            </button>

            <button class="btn btn-success"
                onclick="mostrarEstatisticas()">
                📊 Estatísticas
            </button>

            <button class="btn btn-dark"
                onclick="mostrarRanking()">
                🏆 Ranking
            </button>

            <button class="btn btn-primary"
                onclick="escolherPorMim()">
                🎲 Escolher por Mim
            </button>

            <button class="btn btn-secondary"
                onclick="mostrarConquistas()">
                🏅 Conquistas
            </button>

            <button
            class="btn btn-secondary"
            onclick="mostrarRecomendacoes()">
                🤖 Recomendações
            </button>

            <button
                class="btn btn-danger"
                onclick="logout()">
                Sair
            </button>

        </div>

        <div id="areaAutenticacao" class="auth-card mt-4">

            <h2>Cadastro</h2>

            <input
                type="text"
                id="cadUsuario"
                placeholder="Usuário"
                class="form-control mb-2">

            <input
                type="password"
                id="cadSenha"
                placeholder="Senha"
                class="form-control mb-2">

            <button
                class="btn btn-success mb-3"
                onclick="cadastrar()">
                Cadastrar
            </button>

            <hr>

            <div id="areaLogin">

                <h2>Login</h2>

                <input
                    type="text"
                    id="loginUsuario"
                    placeholder="Usuário"
                    class="form-control mb-2">

                <input
                    type="password"
                    id="loginSenha"
                    placeholder="Senha"
                    class="form-control mb-2">

                <button
                    class="btn btn-primary"
                    onclick="login()">
                    Entrar
                </button>

            </div>

        </div>

    </div>

</header>

<main class="container mt-5">

    <!-- CONTINUE ASSISTINDO -->

<div id="secaoContinuarAssistindo"
     class="mb-5"
     style="display:none;">

    <h2 class="mb-3">
        ▶ Continue Assistindo
    </h2>

    <div id="conteudoContinuar"></div>

</div>

    <div id="continuarAssistindo" class="mb-4"></div>

    <div id="recomendacoesAutomaticas" class="mb-4"></div>

<!-- RECOMENDAÇÕES -->

<div id="secaoRecomendacoes" style="display:none;">
    <h2>🤖 Recomendados Para Você</h2>

      <p class="text-secondary">
            Baseado nos seus favoritos e categorias preferidas
        </p>

    <div id="ListaRecomendacoes"></div>
</div>


    <!-- FILTROS POR TIPO -->
    <div class="mb-4 filtros">

        <h3>Tipo</h3>

        <button class="btn btn-primary" onclick="filtrarTipo('Todos')">
            Todos
        </button>

        <button class="btn btn-success" onclick="filtrarTipo('Série')">
            Séries
        </button>

        <button class="btn btn-danger" onclick="filtrarTipo('Filme')">
            Filmes
        </button>

        <button class="btn btn-secondary" onclick="filtrarTipo('Anime')">
            Anime
        </button>

        <button class="btn btn-warning" onclick="filtrarTipo('Desenho')">
            Desenhos
        </button>

        <button class="btn btn-info" onclick="filtrarTipo('Documentário')">
            Documentários
        </button>

    </div>

    <!-- CATEGORIAS -->

<div class="mb-4">

    <h3>Categorias</h3>

    <div class="carrossel-wrapper">

        <div class="categorias-container">

                 <button class="btn btn-primary" onclick="filtrarCategoria('Todos')">Todos</button>

                <button class="btn btn-warning" onclick="filtrarCategoria('Live Action')">Live Action</button>

                <button class="btn btn-danger" onclick="filtrarCategoria('Super-Herói')">Super-Heróis</button>

                <button class="btn btn-info" onclick="filtrarCategoria('Policial')">Policial</button>

                <button class="btn btn-success" onclick="filtrarCategoria('Fantasia')">Fantasia</button>

                <button class="btn btn-outline-primary" onclick="filtrarCategoria('Ficção Científica')">
                    Ficção Científica
                </button>

                <button class="btn btn-outline-danger" onclick="filtrarCategoria('Terror')">
                    Terror
                </button>

                <button class="btn btn-outline-danger" onclick="filtrarCategoria('Ação')">
                    Ação
                </button>

                <button class="btn btn-outline-success" onclick="filtrarCategoria('Aventura')">
                    Aventura
                </button>

                <button class="btn btn-outline-primary" onclick="filtrarCategoria('Drama')">
                    Drama
                </button>

                <button class="btn btn-outline-warning" onclick="filtrarCategoria('Mistério')">
                    Mistério
                </button>

                <button class="btn categoria-crime" onclick="filtrarCategoria('Crime')">
                    Crime
                </button>

                <button class="btn btn-outline-info" onclick="filtrarCategoria('Comédia')">
                    Comédia
                </button>

                <button class="btn btn-outline-light" onclick="filtrarCategoria('Gospel')">
                   Gospel
                </button>

                <button class="btn btn-outline-secondary" onclick="filtrarCategoria('Suspense')">
                    Suspense
                </button>

        </div>

    </div>

</div>

    <!-- CONTADOR E ORDENAÇÃO -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div id="contadorResultados" class="fw-bold">
            0 resultado(s) encontrado(s)
        </div>

        <select id="ordenacao" class="form-select w-auto">

            <option value="az">
                A → Z
            </option>

            <option value="za">
                Z → A
            </option>

        </select>

    </div>


    

    <!-- LISTA DE SÉRIES -->

    <div id="ListaSeries" class="row g-4"></div>

</main>

<footer class="footer-art7">

    <p>
        © 2026 ART7 - Catálogo de Séries, Filmes, Animes e Documentários
    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="SCRIPT/script.js"></script>

</body>

</html>
